<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
        <h2>Forgot Password</h2>
        <form action="login-form.html">           
            <!-- <label for="email">Enter Email:</label><br> -->
            <input type="email" id="email" placeholder="Enter Your Email Address" required><br><br>

            <!-- <label for="newpass">New Password:</label><br> -->
            <input type="password" id="newpass" placeholder="Enter New Password" required><br><br>

            <!-- <label for="confpass">Confirm Password:</label><br> -->
            <input type="password" id="confpass" placeholder="Confirm New Password" required><br><br>

            <input type="submit" value="Send Reset Password Link">
        </form>
    </center>
</body>
</html>
