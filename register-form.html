<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>
    <center>
        <div>
            <form action="Index(login-form).html">
                <h2>Account Register</h2>
                <input type="text" placeholder="Enter your Name" required><br><br>
                <input type="text" placeholder="Enter Your Email Address"><br><br>
                <input type="text" placeholder="Enter Your Phone Number" required><br><br>
                <input type="password" placeholder="Enter strong password" required>
                <br><br>
                <input type="password" id="password" name="password" class="form-control"
                    placeholder="Confirm Your Password" required minlength="8"
                    pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[@$!%*?&]).{8,}">
                <p>
                    Password must contain:<br>
                    • At least 8 characters<br>
                    • One uppercase letter<br>
                    • One lowercase letter<br>
                    • One number<br>
                    • One special character (@$!%*?&)"
                </p>
                <input type="submit" value="Register"><br>
                <a href="Index(login-form).html">I already have an <b>account</b></a>
            </form>
        </div>
    </center>
</body>

</html>
