<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <center>
        <h2>Register Page</h2>
        <form action="login-form.html">

            <!-- <label>Name:</label><br> -->
            <input type="text" placeholder="Enter your Name" required><br><br>

            <!-- <label>Email ID:</label><br> -->
            <input type="text"  placeholder="Enter Your Email Address"><br><br>

            <!-- <label>Phone Number:</label><br> -->
            <input type="text" placeholder="Enter Your Phone Number" required><br><br>

            <!-- <label>Password:</label><br> -->
            <input type="password" placeholder="Enter Your Password" required><br><br>

            <!-- <label>Confirm Password:</label><br> -->
            <input type="password" placeholder="Confirm Your Password" required><br><br>

            <input type="submit" value="Register"><br><br>
            <a href="login-form.html">I already have an <b>account</b></a>

        </form>    
    </center>
</body>
</html>
